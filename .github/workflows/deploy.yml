name: Deploy
on:
  workflow_call:
    inputs:
      service_path:
        description: "Path on server"
        required: true
        type: string
      image_tag:
        description: "Tag to deploy, leave blank to use latest"
        required: false
        type: string
    secrets:
      TS_OAUTH_CLIENT_ID:
        required: true
      TS_OAUTH_SECRET:
        required: true
      DEPLOY_HOST:
        required: true
      DEPLOY_USER:
        required: true
      DEPLOY_SSH_KEY:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Choose Tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Join Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            ENV_FILE="${{ inputs.service_path }}/.env"
            TAG="${{ steps.tag.outputs.tag }}"

            touch "$ENV_FILE"
            if grep -q '^IMAGE_TAG=' "$ENV_FILE"; then
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$TAG/" "$ENV_FILE"
            else
              echo "IMAGE_TAG=$TAG" >> "$ENV_FILE"
            fi
            echo "Updated IMAGE_TAG to $TAG in $ENV_FILE"
            tail -n 5 "$ENV_FILE" || true

            cd "${{ inputs.service_path }}"
            podman compose pull
            podman compose up -d --remove-orphans
            echo "Currently running:"
            podman ps
